            - paragraph [ref=e113]:
              - strong [ref=e114]: "Remote:"
              - text: 99 % (2x-3x times per year come to Prague)
            - paragraph [ref=e115]:
              - strong [ref=e116]: "Location:"
              - text: Europe
            - paragraph [ref=e117]:
              - strong [ref=e118]: "Type of collaboration:"
              - text: freelance (EU VAT ID required)
            - paragraph [ref=e119]:
              - strong [ref=e120]: "Start:"
              - text: ASAP (2 weeks from the offer)
            - paragraph [ref=e121]:
              - strong [ref=e122]: "Project information:"
            - paragraph [ref=e123]: We are seeking a skilled Backend Software Engineer to build and maintain production-ready Model Context Protocol (MCP)servers that power our AI agent workflows. This role focuses on the Internal AI platform, requiring you to design distributed systems using Python, FastMCP, and Redis with enterprise-grade security.
            - paragraph [ref=e124]:
              - strong [ref=e125]: "About the Role:"
            - paragraph [ref=e126]: You will join a team responsible for the backbone of our AI infrastructure. You will be responsible for designing and deploying FastMCP servers that handle complex agentic workflows. Your work will center on creating robust, asynchronous systems that integrate securely with Azure AD and persist state via Redis. This role demands high code quality, rigorous testing habits (TDD), and close collaboration with platform and delivery teams to ensure scalable, secure AI solutions.
            - paragraph [ref=e127]:
              - strong [ref=e128]: "What You Will Do:"
            - paragraph [ref=e129]: MCP Server & API Development
            - paragraph [ref=e130]: "• Build MCP Servers: Design, build, and maintain high-performance servers using theFastMCPframework, ensuring reliability and maintainability."
            - paragraph [ref=e131]: "• REST API Design: Design and implement RESTful APIs with strict adherence to OpenAPI/Swagger standards, focusing on proper endpoint structure and error handling."
            - paragraph [ref=e132]: "Async Programming: Write clean, efficient Python code utilizing asyncio and httpx for non-blocking I/O operations."
            - paragraph [ref=e133]: Agentic Workflow & Architecture
            - paragraph [ref=e134]: "• Orchestration Systems: Implement and extend agentic workflow orchestration systems, utilizing event-driven architectures and webhook integrations."
            - paragraph [ref=e135]: "• State Management: LeverageRedisfor distributed state persistence, caching strategies, and TTL-based data management."
            - paragraph [ref=e136]: "• System Reliability: Troubleshoot and debug complex issues across the distributed system stack to ensure uptime and performance."
            - paragraph [ref=e137]: Security & DevOps
            - paragraph [ref=e138]: "• Enterprise Security: Implement robust security features, including OAuth2 flows,Azure Entra ID(SSO) integration, and secure JWT token validation."
            - paragraph [ref=e139]: "• Testing & QA: Build and maintain comprehensive test suites (unit, integration, and E2E) using pytest and pytest-asyncio."
            - paragraph [ref=e140]: "• Containerization: Containerize applications using Dockerand manage local/prod environments via docker-compose and Azure pipelines."
            - paragraph [ref=e141]:
              - strong [ref=e142]: Must have skills
            - paragraph [ref=e143]: Core Development
            - paragraph [ref=e144]: • Strong proficiency in Python with deep knowledge ofasync/await patterns.
            - paragraph [ref=e145]: • Solid experience with FastAPI and REST API design.
            - paragraph [ref=e146]: MCP Specialization
            - paragraph [ref=e147]: • Proven experience building MCP servers (critical requirement).
            - paragraph [ref=e148]: • Hands-on experience with FastMCP framework.
            - paragraph [ref=e149]: Data & Storage
            - paragraph [ref=e150]: • Proficiency with Relational Databases (SQL) and Key-Value stores (Redis).
            - paragraph [ref=e151]: Security (IAM)
            - paragraph [ref=e152]: • Deep understanding of AuthN/AuthZ protocols.
            - paragraph [ref=e153]: • Experience with OAuth2, Azure Entra ID/SSO, and JWT token handling.
            - paragraph [ref=e154]: Architecture
            - paragraph [ref=e155]: • Familiarity with Distributed Systems and Event-Driven Architecture.
            - paragraph [ref=e156]: • Experience with Docker and containerization principles.
            - paragraph [ref=e157]: Soft Skills
            - paragraph [ref=e158]: • Strong problem-solving capabilities.
            - paragraph [ref=e159]: • Ability to work independently and communicate technical concepts clearly.
            - paragraph [ref=e160]:
              - strong [ref=e161]: Nice to have skills
            - paragraph [ref=e162]: "• MCP Ecosystem: Orientation in the broader ecosystem of MCP applications and clients."
            - paragraph [ref=e163]: "• AI Frameworks: Experience with AI/LLM agent frameworks such as LangGraph, LangChain, or Langfuse."
            - paragraph [ref=e164]: "• DevOps: Familiarity with Azure CI/CD pipelines and GitHub Actions."
            - paragraph [ref=e165]: "• Observability: Knowledge of Datadog or similar platforms for logging and monitoring."
            - paragraph [ref=e166]: "• Modern Practices: Prior exposure to \"Vibe\" coding practices (AI-assisted iterative coding)."
