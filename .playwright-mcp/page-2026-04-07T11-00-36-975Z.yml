            - listitem [ref=e99]:
              - paragraph [ref=e100]: Minimum 3 years SaaS experience in support, onboarding or pre-sales
            - listitem [ref=e101]:
              - paragraph [ref=e102]: You’re a confident communicator, written and verbal
            - listitem [ref=e103]:
              - paragraph [ref=e104]: You’re comfortable discussing product value and guiding decisions (no hard sell)
            - listitem [ref=e105]:
              - paragraph [ref=e106]: Words like HTML, CSS, JS, API, Integrations, Dev console, staging & production environments, GitHub repo, database queries etc are not alien to you. You don't need to know how to work them but you must know about them (well enough)
            - listitem [ref=e107]:
              - paragraph [ref=e108]: You’re process-driven, highly organised, and thrive in remote, tool-rich environments
            - listitem [ref=e109]:
              - paragraph [ref=e110]: Working remotely suits you perfectly, your natural work ethic makes you a high performer!
            - listitem [ref=e111]:
