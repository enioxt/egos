name: VPS Deploy — Guard Brasil API

# Fires whenever guard-brasil package or API server changes land on main.
# Replaces the previous manual rsync pattern (2026-04-09 fix).
# Security: uses GitHub Secrets for SSH key — never logs credentials.

on:
  push:
    branches: [main]
    paths:
      - 'packages/guard-brasil/**'
      - 'packages/core/**'
      - 'packages/shared/**'
      - 'apps/api/**'
  workflow_dispatch:
    inputs:
      force_rebuild:
        description: 'Force Docker rebuild even if no code change'
        required: false
        default: 'false'

jobs:
  deploy:
    name: Deploy Guard Brasil API to VPS
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Deploy via SSH — git pull + docker rebuild
        uses: appleboy/ssh-action@v1.2.5
        env:
          GH_TOKEN: ${{ secrets.GH_DEPLOY_TOKEN }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          script_stop: true
          timeout: 600s
          envs: GH_TOKEN
          script: |
            set -euo pipefail
            DEPLOY_DIR="/opt/apps/guard-brasil"
            COMPOSE_FILE="$DEPLOY_DIR/apps/api/docker-compose.prod.yml"
            LOG_FILE="/tmp/guard-brasil-deploy-$(date +%Y%m%d-%H%M%S).log"

            echo "=== Guard Brasil Deploy $(date) ===" | tee "$LOG_FILE"

            echo "Step 1: Backup container state..." | tee -a "$LOG_FILE"
            docker inspect guard-brasil-api --format '{{.Config.Image}} {{.Created}}' 2>/dev/null >> "$LOG_FILE" || true

            echo "Step 2: Update code from GitHub..." | tee -a "$LOG_FILE"
            cd "$DEPLOY_DIR"
            # Idempotent git init — safe to run on existing dirs
            [ -d ".git" ] || git init 2>&1 | tee -a "$LOG_FILE"
            # Update remote URL with token (idempotent — add if missing, set-url if exists)
            git remote add origin "https://x-access-token:${GH_TOKEN}@github.com/enioxt/egos.git" 2>/dev/null \
              || git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/enioxt/egos.git"
            # Shallow fetch + hard reset (no merge conflicts possible)
            git fetch origin main --depth=1 --quiet 2>&1 | tee -a "$LOG_FILE"
            git reset --hard FETCH_HEAD 2>&1 | tee -a "$LOG_FILE"
            echo "  Code: $(git rev-parse --short HEAD)" | tee -a "$LOG_FILE"

            # Verify compose file exists after code update
            if [ ! -f "$COMPOSE_FILE" ]; then
              echo "ERROR: $COMPOSE_FILE not found — aborting" | tee -a "$LOG_FILE"
              exit 1
            fi

            echo "Step 3: Rebuild Docker image (no-cache for code changes)..." | tee -a "$LOG_FILE"
            docker compose -f "$COMPOSE_FILE" build --no-cache 2>&1 | tee -a "$LOG_FILE"

            echo "Step 4: Rolling restart (zero-downtime)..." | tee -a "$LOG_FILE"
            docker compose -f "$COMPOSE_FILE" up -d --force-recreate 2>&1 | tee -a "$LOG_FILE"

            echo "Step 5: Health check..." | tee -a "$LOG_FILE"
            sleep 5
            HEALTH=$(curl -sf http://localhost:3099/health 2>/dev/null || echo '{"status":"unreachable"}')
            echo "Health: $HEALTH" | tee -a "$LOG_FILE"

            VERSION=$(echo "$HEALTH" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('version','unknown'))" 2>/dev/null || echo "parse_error")
            STATUS=$(echo "$HEALTH" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('status','unknown'))" 2>/dev/null || echo "parse_error")

            if [ "$STATUS" != "healthy" ]; then
              echo "ERROR: Health check failed after deploy. Rolling back..." | tee -a "$LOG_FILE"
              docker compose -f "$COMPOSE_FILE" up -d --force-recreate 2>&1 | tee -a "$LOG_FILE"
              exit 1
            fi

            echo "=== Deploy SUCCESS: guard-brasil v$VERSION is $STATUS ===" | tee -a "$LOG_FILE"
            echo "Log saved to $LOG_FILE"

      - name: Verify external health
        run: |
          sleep 10
          RESPONSE=$(curl -sf https://guard.egos.ia.br/health || echo '{"status":"unreachable"}')
          VERSION=$(echo "$RESPONSE" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('version','unknown'))" 2>/dev/null || echo "unknown")
          STATUS=$(echo "$RESPONSE" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('status','unknown'))" 2>/dev/null || echo "unknown")
          echo "guard.egos.ia.br: v$VERSION — $STATUS"
          if [ "$STATUS" != "healthy" ]; then
            echo "::error::guard.egos.ia.br health check failed post-deploy"
            exit 1
          fi

      - name: Notify on failure
        if: failure()
        run: |
          echo "::error::Guard Brasil VPS deploy failed. Manual rollback may be needed."
          echo "SSH to VPS: ssh root@${{ secrets.VPS_HOST }}"
          echo "Rollback: cd /opt/apps/guard-brasil && git reset --hard HEAD~1 && docker compose -f apps/api/docker-compose.prod.yml up -d --build"
