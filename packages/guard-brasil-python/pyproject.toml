[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.backends.legacy:build"

[project]
name = "egosbr-guard-brasil"
version = "0.1.0"
description = "Guard Brasil — Brazilian PII detection and LGPD compliance for Python"
readme = "README.md"
license = {text = "MIT"}
requires-python = ">=3.9"
keywords = ["lgpd", "pii", "brasil", "cpf", "cnpj", "privacy", "compliance"]
dependencies = [
    "httpx>=0.24.0",
    "pydantic>=2.0.0",
]

[project.optional-dependencies]
langchain = ["langchain-core>=0.2.0"]
openai = ["openai>=1.0.0"]
anthropic = ["anthropic>=0.25.0"]
all = ["langchain-core>=0.2.0", "openai>=1.0.0", "anthropic>=0.25.0"]

[project.urls]
Homepage = "https://guard.egos.ia.br"
Documentation = "https://guard.egos.ia.br/docs"
Repository = "https://github.com/enioxt/egos"
