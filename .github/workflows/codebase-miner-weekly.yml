name: Codebase Miner Weekly (ARCH-004)

on:
  schedule:
    # Sexta 03h00 BRT (06h00 UTC) — disponível no /start briefing de segunda
    - cron: '0 6 * * 5'
  workflow_dispatch:
    inputs:
      phase2:
        description: 'Run Phase 2 (stale docs scan)'
        required: false
        default: 'false'
        type: boolean

jobs:
  codebase-miner:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run codebase miner (Phase 1)
        run: bun scripts/codebase-miner.ts
        # Note: only egos repo is checked in CI; full multi-repo scan runs on VPS (ARCH-004 VPS cron)

      - name: Run codebase miner (Phase 2 - stale docs)
        if: ${{ inputs.phase2 == 'true' }}
        run: bun scripts/codebase-miner.ts --phase2

      - name: Upload report as artifact
        uses: actions/upload-artifact@v4
        with:
          name: codebase-mining-report
          path: docs/jobs/codebase-mining-*.md
          retention-days: 30

      - name: Commit report to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/jobs/codebase-mining-*.md || true
          git diff --cached --quiet && echo "No changes" || \
            git commit -m "chore(arch): codebase mining report $(date +%Y-%m-%d) [skip ci]"
          git push || (git pull --rebase && git push)
