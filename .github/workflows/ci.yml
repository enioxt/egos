name: EGOS CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: TypeScript check
        run: bun run typecheck

      - name: Agent registry lint
        run: bun run agent:lint

      - name: SSOT consistency validation (GH-040)
        run: bun run ssot:check

      - name: API smoke tests (GH-041)
        run: |
          echo "Starting API server (background)..."
          bun run apps/api/src/server.ts &
          API_PID=$!
          sleep 2
          echo "Running smoke tests..."
          bun run smoke:api
          TEST_RESULT=$?
          kill $API_PID 2>/dev/null || true
          exit $TEST_RESULT
        env:
          GUARD_API_PORT: 3099
          GUARD_API_KEY: "test-key"   # Used by smoke-test-api.ts (GUARD_API_KEY, not plural)

      - name: Version lock check (GH-042)
        run: bun run version:lock

      - name: SSOT drift check (legacy)
        run: |
          check_lines() {
            file="$1"; max="$2"
            if [ -f "$file" ]; then
              lines=$(wc -l < "$file")
              if [ "$lines" -gt "$max" ]; then
                echo "SSOT DRIFT: $file has $lines lines (max: $max)"
                return 1
              fi
              echo "  $file: $lines/$max OK"
            fi
          }
          check_lines "AGENTS.md" 200
          check_lines "TASKS.md" 500
          check_lines ".windsurfrules" 150
          check_lines ".guarani/PREFERENCES.md" 100

      - name: SSOT diagnostic check
        id: ssot_diagnostic
        run: bun run ssot:diagnostic

      - name: SSOT diagnostic summary
        if: always()
        run: |
          {
            echo "## SSOT Diagnostic"
            echo
            if [ -f /tmp/qa-ssot-check.md ]; then
              cat /tmp/qa-ssot-check.md
            /tmp/qa-envelope.json
            else
              echo "- ❌ Missing artifact: /tmp/qa-ssot-check.md"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Frozen zones check
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            CHANGED=$(git diff --name-only origin/main...HEAD 2>/dev/null || echo "")
            FROZEN="agents/runtime/runner.ts agents/runtime/event-bus.ts .husky/pre-commit"
            for f in $FROZEN; do
              if echo "$CHANGED" | grep -q "^${f}$"; then
                echo "::error::Frozen zone modified: $f"
                exit 1
              fi
            done
            echo "✅ No frozen zones modified"
          else
            echo "✅ Push to main — frozen zone check skipped (enforced by pre-commit)"
          fi

      - name: QA observability suite
        id: qa_observability
        continue-on-error: true
        run: bun run qa:observability

      - name: QA gate summary (friendly annotation)
        if: always()
        run: |
          {
            echo "## QA Observability Gate"
            echo
            if [ -f /tmp/qa-evidence.md ]; then
              cat /tmp/qa-evidence.md
            else
              echo "- ❌ Missing artifact: /tmp/qa-evidence.md"
            fi
            echo
            echo "### Hint de correção"
            echo "- Rode localmente: \`bun run qa:observability\`"
            echo "- Gate estrito isolado: \`bun run qa:evidence:gate\`"
          } >> "$GITHUB_STEP_SUMMARY"

          if [ "${{ steps.qa_observability.outcome }}" != "success" ]; then
            echo "::error::QA observability suite failed. See 'QA Observability Gate' in job summary and uploaded artifacts."
          fi

      - name: Enforce QA observability gate
        if: always()
        run: |
          if [ "${{ steps.qa_observability.outcome }}" != "success" ]; then
            exit 1
          fi

      - name: Upload QA artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: qa-observability-artifacts
          path: |
            /tmp/qa-commit-audit.md
            /tmp/qa-telemetry-dashboard.md
            /tmp/qa-telemetry-forecast.md
            /tmp/qa-pending-tasks.md
            /tmp/qa-stalled-tasks.md
            /tmp/qa-guardrail.txt
            /tmp/qa-evidence.md
            /tmp/qa-ssot-check.md
            /tmp/qa-envelope.json
