        - generic [ref=e68]:
          - paragraph [ref=e69]: Are you commercially savvy, technically capable, highly organised and great with people? Do you speak fluent German and want to help clients get the most out of a world-class SaaS platform?
          - paragraph [ref=e70]: Then this is the role you have been looking for. Join a lean-by-design, fast-growth and globally recognised B2B SaaS company as a product specialist focused on the DACH+ markets.
          - paragraph [ref=e71]: Our much-loved products are in high-demand and proven to make a difference to our clients' lives. You'll be supporting these clients with everything they need to discover, use and ultimately advocate for our software products through clear pre-sales discussions, tight onboarding and responsive, friendly support.
          - paragraph [ref=e72]: SaaS experience (selling and/or supporting) is mandatory. Strong communication skills, patience, curiosity, keenness to learn, and friendliness are key to success in this role. A strong commercial instinct will set you apart.
          - heading "Join our Rebel Alliance" [level=2] [ref=e73]
          - paragraph [ref=e74]: Creative Force is experiencing tremendous growth and as we scale our efforts in 2025 and beyond, we’re looking for enthusiastic and commercially astute individuals to join our diverse team of Jedi.
          - paragraph [ref=e75]: You'll be a respected member of our remote global Client Success team and will be well supported with the tools, knowledge and answers you need to provide exceptional levels of service.
          - paragraph [ref=e76]: "In time, you’ll master the Force: knowing how to work across departments, align with different teams and draw on collective expertise to support our clients. You’ll have the backing you need at every turn to develop that understanding with confidence."
          - heading "Responsibilities" [level=2] [ref=e77]
          - list [ref=e78]:
            - listitem [ref=e79]:
              - paragraph [ref=e80]: Help prospects find the specific value they seek (“this is the product you are looking for”)
            - listitem [ref=e81]:
              - paragraph [ref=e82]: With our help, learn to be a product expert to confidently demonstrate and answer product questions with clients and prospects
            - listitem [ref=e83]:
              - paragraph [ref=e84]: Respond accurately and quickly to client questions
            - listitem [ref=e85]:
              - paragraph [ref=e86]: Onboard and support DACH+ clients in German and/or English
            - listitem [ref=e87]:
              - paragraph [ref=e88]: Report recurring issues to improve the product experience
            - listitem [ref=e89]:
              - paragraph [ref=e90]: Collaborate with our global team to stay on the leading edge
            - listitem [ref=e91]:
              - paragraph [ref=e92]: Build trust through honesty, empathy, and reliability
          - heading "Essentials" [level=2] [ref=e93]
          - list [ref=e94]:
            - listitem [ref=e95]:
              - paragraph [ref=e96]: You are a native German speaker with strong English (C2+)
            - listitem [ref=e97]:
