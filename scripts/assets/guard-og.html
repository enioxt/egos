<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<title>Guard Brasil OG</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --navy:#0A0E27;
    --navy-2:#1A2F5A;
    --blue:#2563EB;
    --green:#10B981;
    --text:#F8FAFC;
    --mute:#94A3B8;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{width:1200px;height:630px;background:transparent;font-family:'Inter',system-ui,sans-serif;color:var(--text);-webkit-font-smoothing:antialiased}
  .og{
    width:1200px;height:630px;
    background:radial-gradient(1400px 900px at 75% 30%, #13214a 0%, var(--navy) 55%, #05071a 100%);
    position:relative;overflow:hidden;
    padding:72px 80px;display:flex;align-items:center;justify-content:space-between;gap:60px;
  }
  .grid{position:absolute;inset:0;
    background-image:
      linear-gradient(rgba(37,99,235,.07) 1px,transparent 1px),
      linear-gradient(90deg,rgba(37,99,235,.07) 1px,transparent 1px);
    background-size:48px 48px;mask-image:radial-gradient(900px 700px at 50% 55%,#000 30%,transparent 85%);
  }
  .content{position:relative;z-index:2;max-width:680px}
  .brand{display:flex;align-items:center;gap:14px;margin-bottom:28px}
  .mark{width:44px;height:44px;border-radius:10px;background:linear-gradient(180deg,#34D399,#059669);display:flex;align-items:center;justify-content:center;box-shadow:0 8px 24px rgba(16,185,129,.35)}
  .brand .name{font-weight:800;font-size:22px;letter-spacing:-.02em}
  .brand .dot{color:var(--mute);font-weight:500}
  .brand .sub{color:var(--mute);font-size:15px;font-weight:500}
  h1{font-size:68px;line-height:1.04;font-weight:800;letter-spacing:-.035em;margin-bottom:22px}
  h1 .hl{background:linear-gradient(180deg,#6EE7B7,#10B981);-webkit-background-clip:text;background-clip:text;color:transparent}
  .desc{font-size:22px;line-height:1.45;color:#CBD5E1;max-width:620px;margin-bottom:28px}
  .chips{display:flex;gap:10px;flex-wrap:wrap}
  .chip{border:1px solid rgba(148,163,184,.25);background:rgba(15,23,42,.4);padding:10px 16px;border-radius:999px;font-size:14px;font-weight:500;color:#E2E8F0;font-family:'JetBrains Mono',monospace}
  .chip.g{color:#6EE7B7;border-color:rgba(16,185,129,.35);background:rgba(16,185,129,.08)}
  .url{position:absolute;left:80px;bottom:44px;color:var(--mute);font-size:15px;font-family:'JetBrains Mono',monospace;letter-spacing:.01em}
  .shield{position:relative;z-index:2;flex-shrink:0}
  .shield svg{filter:drop-shadow(0 40px 60px rgba(0,0,0,.55)) drop-shadow(0 0 40px rgba(16,185,129,.35))}
  .ring{position:absolute;right:80px;top:50%;transform:translateY(-50%);width:440px;height:440px;border-radius:50%;border:1px dashed rgba(148,163,184,.15)}
  .ring.i{width:360px;height:360px;border-color:rgba(148,163,184,.10)}
</style>
</head>
<body>
  <div class="og">
    <div class="grid"></div>
    <div class="ring"></div>
    <div class="ring i" style="right:120px"></div>
    <div class="content">
      <div class="brand">
        <div class="mark">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none"><path d="M12 3 L20 6 L20 13 Q20 18 12 21 Q4 18 4 13 L4 6 Z" fill="#0A0E27"/><path d="M8 12 L11 15 L16 9" stroke="#10B981" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" fill="none"/></svg>
        </div>
        <div>
          <div class="name">Guard Brasil</div>
          <div class="sub">LGPD &middot; PII detection API</div>
        </div>
      </div>
      <h1>Detecção de PII<br>brasileira<br><span class="hl">em 4ms.</span></h1>
      <div class="desc">CPF, RG, CNPJ, MASP e mais 11 padrões nativos. Open source, free tier 500 chamadas/mês.</div>
      <div class="chips">
        <span class="chip g">15 padrões BR</span>
        <span class="chip">LGPD compliance</span>
        <span class="chip">OpenAPI + SDK</span>
      </div>
    </div>
    <div class="shield">
      <svg width="340" height="410" viewBox="0 0 360 440">
        <defs>
          <linearGradient id="b" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#34D399"/><stop offset="55%" stop-color="#10B981"/><stop offset="100%" stop-color="#047857"/>
          </linearGradient>
          <linearGradient id="e" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#6EE7B7"/><stop offset="100%" stop-color="#059669"/>
          </linearGradient>
          <linearGradient id="s" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="#ffffff" stop-opacity=".35"/><stop offset="50%" stop-color="#ffffff" stop-opacity="0"/>
          </linearGradient>
        </defs>
        <path d="M180 10 L330 60 L330 240 Q330 355 180 430 Q30 355 30 240 L30 60 Z" fill="url(#e)"/>
        <path d="M180 26 L314 70 L314 238 Q314 340 180 410 Q46 340 46 238 L46 70 Z" fill="url(#b)"/>
        <path d="M180 26 L314 70 L314 238 Q314 340 180 410 Q46 340 46 238 L46 70 Z" fill="url(#s)"/>
        <path d="M110 220 L165 275 L260 160" fill="none" stroke="#0A0E27" stroke-width="22" stroke-linecap="round" stroke-linejoin="round" opacity=".85"/>
        <path d="M110 220 L165 275 L260 160" fill="none" stroke="#ECFDF5" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
    <div class="url">guard.egos.ia.br &nbsp;&middot;&nbsp; npm: @egosbr/guard-brasil</div>
  </div>
</body>
</html>
