# .ssot-map.yaml — EGOS SSOT Domain Map
# Machine-readable version of CLAUDE.md §26 (SSOT-First Rule)
# Used by: scripts/ssot-router.ts (pre-commit SSOT gate)
# Updated: 2026-04-07 | Version: 3.0.0 — 26 domains

version: "2.0.0"

# ─── TIER 1: GTM & REVENUE ────────────────────────────────────────────────────

domains:
  - id: gtm
    description: "GTM, social media, outreach, equity, partners, X.com posts, threads"
    ssot: "docs/GTM_SSOT.md"
    ssot_social: "docs/social/X_POSTS_SSOT.md"
    keywords:
      - "parceiro"
      - "partner"
      - "equity"
      - "gtm"
      - "outreach"
      - "tweet"
      - "thread"
      - "x.com"
      - "xcom"
      - "@anoineim"
      - "vendas"
      - "sales"
      - "revenue share"
      - "co-fundador"
      - "go-to-market"
    forbidden_paths:
      - "docs/sales/"
      - "docs/strategy/PART*.md"
      - "docs/strategy/DISTRIBUTION*.md"
      - "docs/strategy/OUTREACH*.md"
    note: "Partner briefs in docs/outreach/ are GTM content — consolidate into GTM_SSOT.md"

  - id: monetization
    description: "Pricing tiers, revenue model, billing, Stripe, product economics"
    ssot: "docs/business/MONETIZATION_SSOT.md"
    keywords:
      - "pricing"
      - "R$/mo"
      - "R$/mes"
      - "MRR"
      - "ARR"
      - "stripe"
      - "billing"
      - "free tier"
      - "starter"
      - "enterprise tier"
      - "churn"
      - "LTV"
      - "CAC"
    forbidden_paths:
      - "docs/pricing/"
      - "*_PRICING*.md"
      - "*_MONETIZATION*.md"
    note: "Ecosystem-level economics. GTM execution goes to GTM_SSOT.md."

