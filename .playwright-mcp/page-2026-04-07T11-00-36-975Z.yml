              - paragraph [ref=e50]: Creative Force is the maker of industry-leading cloud software for organisers of awards, grants, scholarships and pitch competitions to manage submission, evaluation and awards, online.
              - paragraph [ref=e51]: Since launching in Australia late 2013, we’ve had an outstanding market response and we’re now supporting a growing list of clients across Asia Pacific, Europe, North & South America and the Middle East.
              - paragraph [ref=e52]: Creative Force builds beautifully designed, high quality software and we make sure all our clients have a fantastic experience!
              - paragraph [ref=e53]: Our growing team is distributed across 43 cities in 25 countries, mostly working from home offices. We use a range of internet-based tools for communication and collaboration that help our teams work closely over global distance and time zones.
              - paragraph [ref=e54]:
