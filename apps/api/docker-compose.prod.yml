version: '3.8'

services:
  guard-brasil-api:
    build:
      context: ../..
      dockerfile: apps/api/Dockerfile
    container_name: guard-brasil-api
    restart: unless-stopped
    ports:
      - "127.0.0.1:3099:3099"
    env_file:
      - ../../.env.docker
    environment:
      GUARD_API_PORT: "3099"
      GUARD_RATE_LIMIT: "100"
    healthcheck:
      test: ["CMD", "bun", "-e", "fetch('http://localhost:3099/health').then(r=>r.ok?process.exit(0):process.exit(1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    labels:
      - "com.egos.service=guard-brasil-api"
      - "com.egos.version=0.1.0"

networks:
  default:
    name: guard-brasil
