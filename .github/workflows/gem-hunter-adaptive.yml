name: Gem Hunter Adaptive

on:
  schedule:
    # Seg + Qui 2h37 BRT (5h37 UTC)
    - cron: '37 5 * * 1,4'
  workflow_dispatch:
    inputs:
      tracks:
        description: 'Tracks to run (comma-separated)'
        required: false
        default: 'x-signals-public,early-warning,governance-plugplay'
      x_limit:
        description: 'Max X API results per keyword'
        required: false
        default: '15'

jobs:
  gem-hunter:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0  # full history needed for safe rebase before push

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Run Gem Hunter
        env:
          EXA_API_KEY: ${{ secrets.EXA_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          ALIBABA_DASHSCOPE_API_KEY: ${{ secrets.ALIBABA_DASHSCOPE_API_KEY }}
          X_BEARER_TOKEN: ${{ secrets.X_BEARER_TOKEN }}
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}
        run: |
          TRACKS="${{ github.event.inputs.tracks || 'x-signals-public,early-warning,governance-plugplay' }}"
          XLIMIT="${{ github.event.inputs.x_limit || '15' }}"
          bun run agents/agents/gem-hunter.ts --exec --track=${TRACKS} --x-limit=${XLIMIT} --analyze

      - name: Commit and safe-push discovery artifacts
        run: |
          git config --global user.name "Gem Hunter Bot"
          git config --global user.email "bot@egos.dev"
          if [[ -z $(git status -s) ]]; then
            echo "No changes to commit"
            exit 0
          fi
          git add docs/gem-hunter/
          git commit -m "chore(gem-hunter): adaptive run [$(date +'%Y-%m-%d')]"

          # Safe push: never use --force on main. If push fails because main
          # advanced while we ran, fetch + rebase + retry up to 3 times. This
          # prevents the 2026-04-06 incident where stale runners would push
          # blindly and (with branch protection off) drop in-flight commits.
          for attempt in 1 2 3; do
            if git push origin HEAD:main; then
              echo "Push succeeded on attempt $attempt"
              exit 0
            fi
            echo "Push failed (attempt $attempt) — fetching and rebasing"
            git fetch origin main
            if ! git rebase origin/main; then
              echo "Rebase conflict — aborting and bailing out"
              git rebase --abort
              echo "::error::gem-hunter could not safely push (rebase conflict). Inspect the run and resolve manually."
              exit 1
            fi
          done
          echo "::error::gem-hunter push failed after 3 attempts — main is changing too fast or there is a remote issue"
          exit 1
