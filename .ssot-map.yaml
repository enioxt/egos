# ─── OPEN CONSOLIDATION TASKS ─────────────────────────────────────────────────
# These directories contain dispersed content that should be merged into their SSOT:
#
# docs/outreach/       → merge into docs/GTM_SSOT.md (partnership kits, prospect lists)
# docs/sales/          → merge into docs/GTM_SSOT.md or MONETIZATION_SSOT.md
# docs/MCP_*.md (x7)   → create docs/MCP_SSOT.md and consolidate (P35)
# egos-lab/branding/   → resolve EGOS-132 brand conflict
# docs/products/       → evaluate: product-specific docs may be OK as standalone

